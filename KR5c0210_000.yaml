front:
  text: 太上正一朝天三八謝罪法懴則八
  hash: sha256:ad69fbd4a34d291af4f5783997e6c20d6c7729c14cf39609a0051835eeda0849
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0210_HFL_000-001a, image: hfl/0567/0567-004.png}
body:
  text: 開啓如儀切以玄皇闡教廣開度於冥迷正一垂科俾懴陳於罪垢人孰無過法許自新奉道臣某以今焚香百拜奏啓三清上聖十極髙真昊天玉皇大天尊玄穹髙上帝天地水府三官大帝祖師三天扶教輔元大法師正一沖玄神化靜應顯佑真君正一女師嗣師系師真君王趙二真人五帝六宫四司九署法籙官將三界神祇城隍祀典應感真靈咸望垂光鑒今懴悔伏念臣某自從無始以至有生縱一念以冥行六根纒結恣三業而罔覺十惡積增惟知馳騖於紅塵豈慮記標於黑簿捫心知懼撫巳若驚以今恭值某節謹遵天師科教百拜朝天一誠悔過仰望髙真哀愍大道慈憐念彼愚蒙曲垂原赦蠲其宿業之籍免玄祖拘滯於幽關開以遷善之門俾方寸通明於真性玄功克備道行圓融動止和平眷緣亨泰臣某下情無任瞻天望聖激切屏營之至虔運一誠至恭三禮太上無極大道至心朝禮三十六部尊經玄中大法師太上正一朝天三八謝罪法懴昔祖天師居于閬州雲臺山上歲在丙申永夀三年九月九日太上遣使授以玉册賜三天扶教輔元大法師正一真人之號詔升舉期亭午之際朱衣持版綃衣捧函二十四仙龍虎鹿鶴青幢絳節綵雲紫霧天香芬馥仙樂徘徊玉女二人引天師真人與夫人雍氏上登寶輦升舉雲霄至太玄都省其時從學弟子三千六百餘人攀慕無階悲喜交切口誦師號求度仙名天師惟許王趙仙子宿業清淨功者行成同登天闕乃以太上所授符籙印劒三洞衆經謝罪超度科式傳付嗣師於是嗣師隱習先業謝過修功光和二年正月十五日千陽平山奉詔上升乃以是真科付度系師隱系師學道仙子求度雖專尚多宿纍修有勤墯道無親踈所以流轉三界五輪為有六根結成十惡積習愆尤在於曩劫障迷道業在於今生一曰眼根二曰耳根三曰鼻根四曰舌根五曰身根六曰意根因此六根遂生諸業猶如草木抽枝播葉生花結實展轉滋蔓有能修之得以正定六根諸罪自然清淨復次身三惡業殺盜邪淫身根結成心三惡業貪瞋愚癡意根結成口四惡業兩舌惡罵綺言妄語舌根結成因此三業遂生十惡猶如蛇蝎搖毒自防觸必傷人展轉熾盛有能修之得以智慧十惡諸罪自然清淨昔祖天師特修太上修真謝罪超度玄祖科式真文故得宿業頓消道功成就先靈受度身乃飛升況今世入澆浮人多過犯欲使形神合道須得障纍頓消當依三八謝罪之儀懴述先世積生釁咎一誠悔過百拜朝天至心皈命玉皇大天尊玄穹髙上帝各發誓願以日為年三毒十惡之罪誓願斷絶一千三百之善誓願進修庶幾漸入仙宗次第亦升於夭路汝宜遞相授受勉而行之大道慈悲隨心應感懴罪罪滅修福福生今故歸依至心朝禮志心歸命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉清宫無極無上聖無無復光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通玉皇大天尊玄穹髙上帝十拜臣等至心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重身業大罪第一殺生稟性凶殘恣行殺戮酷刑虐政害物傷生仰射飛禽俯逐走獸傾巢發蟄湯潑火焚損子墮胎烹雛破卵資給口腹諂祭邪神謀殺教殺故殺誤殺展轉輪回互相殺害從今懴悔並冀赦原願與一切衆生俱人慈濟門永斷殺生業先靈受度永免倒懸屠割報緣弟子蒙恩天上人間願得久視長生福果形神俱妙與道合真今故皈依至心朝禮玉誥如前十拜臣等至心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重身業大罪第二竊盜懷姦設計偷掠穿窬背公循私明瞞暗騙或盜父母財物君王財物三寶財物五姓財物駸駸不巳蠢蠢無知侵攘劫奪不恤恩義不懼神明不以失者為憂但以得之為喜從今懴悔並冀赦除願與一切衆生俱入廉節門永斷竊盜業先靈受度永免金鎚鐡杖報緣弟子蒙恩天上人間願得冨貴崇髙福果形神俱妙與道合真今故歸依至心朝禮玉誥十拜臣等至心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重身業大罪第三邪淫性濁情浮耽淫嗜欲愛憎嫉妬黷亂禮經不避親踈故違禁戒邪思妄想氣憊神狂恣縱無明逸樂無度誘惑一切祼露三光男不忠良女不貞潔濫遊邪徑迷失正途沉溺愛河流趨欲海從今懴悔並冀赦除願與一切衆生俱入清淨門永斷邪淫業先靈受度永免氷戟霜刃報緣弟子蒙恩天上人間願得隨意具足福果形神俱妙與道合真今故皈依至心朝禮玉誥十拜臣等至心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重心業大罪第一曰貪貪毒驅馳慳貪靳吝貪取忘義貪愛無猒智取巧求異術左道損他益已害物傷生過索倍徵強侵冒占一如溪壑百計經營借貸不還寄托推失倚恃聲勢抗拒姦欺負命負財負恩負義從今懴悔並冀赦除願與一切衆生俱入施捨門永斷慳貪業先靈受度永免鐵牀銅柱報緣弟子蒙恩天上人間願得快樂安榮福果形神俱妙與道合真今故皈依至心朝禮玊誥十拜臣等志心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重心業大罪第二曰嗔嗔火熾炎業風飄蕩恃強凌弱鼓衆暴寡傲上慢下妬賢疾能或對日月星辰恣行瞋怒或對父母師長恣行瞋怒枉役奴婢恣行瞋怒小失便宜恣行瞋怒口毒過於蜂蠆心險利於風刀外結𡨚憎內懷忿怒從今懴悔並冀赦除願與一切衆生俱入歡喜門永斷瞋怒業先靈受度永免飛戈飄戟報緣弟子蒙恩天上人間願得體相端嚴福果形神俱妙與道合真今故皈依至心朝禮玊誥十拜臣等志心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重心業大罪第三愚癡不孝不忠不仁不義傲誕三寶輕慢三光公肆欺詐隂懷賊害違天犯地背理恣驕瀆亂典常荒淫汙染明明造罪故故為非外忘廉謹之儀內懷暴虐之志褻狎邪穢蔑視宗親顚倒猖狂狠戾妖幻從今懴悔並冀赦除願與一切衆生俱入智慧門永斷愚癡業先靈受度永免刀山劒樹報緣弟子蒙恩天上人間願得聰明智慧福果形神俱妙與道合真今故皈依志心朝禮玉誥十拜臣等志心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重口業大罪第一兩舌言辭悖戾謗議善良誑惑多端強辨逆理嗊嗃三寶訾毀大乘咨暑怨寒呵風罵雨妝唆詞訟破壞規模説誘勾索鬪合爭競面譽背毀口是心非誇己之能揚人之醜間諜宗黨起發風波邪行邪言無忠無信從今懴悔並冀赦除願與一切衆生俱入三乘門永斷兩舌業先靈受度永免吞火食炭報緣弟子蒙恩天上人間願得吉祥清慶福果形神俱妙與道合真今故皈依至心朝禮玊誥十拜臣等至心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重口業大罪第二惡罵久淪畜趣乍入人身臭語腥羶熏穢天地穢聲毒惡觸突真靈惱亂人民恐脅淳弱悖慢尊長凌辱平人恣醉佯狂耽嗜香味害物害命資充啖食倡打倡殺曾不慈憐廣結𡨚讎恣加濁辱從今懴悔並冀赦除願與一切衆生俱入方便門永斷惡罵業先靈受度永免燒炙焦爛報緣弟子蒙恩天上人間願得福祿夀安福果形神俱妙與道合真今故皈依至心朝禮玉誥十拜臣等至心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重口業大罪第三綺語言乖禮法行習輕浮令色足恭華音麗韻淫辭褻瀆緣飾風情宛轉謳歌起人邪念變白為黑抑是為非虛妝繡綺之談幻惑愚迷之聽自昧隂隲不覺不知廣積愆瑕無邊無量從今懴悔並冀赦除願與一切衆生俱入讃歎門永斷綺語業先靈受度永免鑊湯爐炭報緣弟子蒙恩天上人間願得度品上仙福果形神俱妙與道合真今故皈依至心朝禮玉誥十拜臣等至心皈神皈身皈命百拜朝天一誠悔過重念臣某爰從宿世逮及今生三毒業深十惡障重口業大罪第四妄言越禮飾辭昧心巧舌不尊君父師友不敬天地神明架説鑿空更相誑惑故起搖撼護短抑長以姦為計以妄為常指誓證他自欺方寸呪咀求直弗顧幽冥擅逞浮華猜嫌情實先賢善訓大道經書罔克誦持每加貶辟從今懴悔並冀赦除願與一切衆生俱入頓覺門永斷妄言業先靈受度永免穿腸耕舌報緣弟子蒙恩天上人間願得復本自然福果形神俱妙與道合真今故皈依志心朝禮玊誥十拜爾時系師復告學道仙子曰人處塵凡動成愆過無邊無量難述難殫百拜朝天悉巳發露十惡大罪復竟披陳一念改修頓歸清淨猶如明鑑塵垢蒙蔽忽遇良工用藥磨洗塵垢淨盡還復光明罪滅福生亦復如是諸天上聖立教真仙常勸世人勤修懴悔懴者不敢隱於往咎悔者不再犯於前非口既懴陳身能拜跪心須悔責改過遷善即有十天善神同垂保舉三界衆真共作護持其或不省不悛不懴不悔漸至罪根纒結日積月深即有隂陽曹局考較凶邪鬼魅侵凌疾病不痊災難競起公私多滯魔障多端若有來世人民遇修此道當感三官五帝九府四司察志觀勤紀功宥過疾病得愈道業得成仕宦得遷羈囚得脫一切苦厄所不能加夀命延永身心安逸若為亡殁懴悔追修即得譴削黑書魂升紫府若凶荒飢饉水火旱蝗殟疫復連兵戈劫掠能依科法懴禮消禳即得國土清平民物昌熾若婦人懷孕生育艱難或鬼怪興妖家門多變能修香火懴禮禱祈即得母子全安身位寧靜若復有人常勤懴禮學道成道求仙得仙若復有人因事懴禮所願者合所為者成天上人間他生見世獲福無量證果非虛由是系師棄官精煉紹襲仙宗政始六年八月一日亦於陽平山奉詔上升以此真科流傳後世有緣緣會自度度他願與含生同臻福慶稽首禮謝無上虛皇正真三寶太上正一朝天三八謝罪法懴
